name: Deploy Frontend

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'frontend/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: garden-club-frontend
  # ECS service/cluster names follow a dev/prod convention; resolved per branch below.
  # dev:  garden-club-frontend-dev  on cluster garden-club-dev
  # prod: garden-club-frontend-prod on cluster garden-club-prod

jobs:
  # ── 1. Resolve environment ────────────────────────────────────────────────
  resolve-env:
    name: Resolve environment
    runs-on: ubuntu-latest
    outputs:
      env_label:      ${{ steps.env.outputs.env_label }}
      ecs_cluster:    ${{ steps.env.outputs.ecs_cluster }}
      ecs_service:    ${{ steps.env.outputs.ecs_service }}
      image_tag_full: ${{ steps.env.outputs.image_tag_full }}
    steps:
      - name: Set environment variables by branch
        id: env
        run: |
          SHA_SHORT="${GITHUB_SHA::8}"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env_label=prod"            >> "$GITHUB_OUTPUT"
            echo "ecs_cluster=garden-club-prod" >> "$GITHUB_OUTPUT"
            echo "ecs_service=garden-club-frontend-prod" >> "$GITHUB_OUTPUT"
          else
            echo "env_label=dev"             >> "$GITHUB_OUTPUT"
            echo "ecs_cluster=default"  >> "$GITHUB_OUTPUT"
            echo "ecs_service=garden-club-frontend-dev"  >> "$GITHUB_OUTPUT"
          fi
          echo "image_tag_full=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

  # ── 2. Build Docker image and push to ECR ────────────────────────────────
  build-and-push:
    name: Build & push to ECR
    runs-on: ubuntu-latest
    needs: resolve-env
    environment: ${{ needs.resolve-env.outputs.env_label }}
    permissions:
      id-token: write   # required for OIDC
      contents: read
    outputs:
      image_uri: ${{ steps.push.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/garden-club-github-${{needs.resolve-env.outputs.env_label}}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: push
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG:     ${{ needs.resolve-env.outputs.image_tag_full }}
          ENV_LABEL:     ${{ needs.resolve-env.outputs.env_label }}
          # NEXT_PUBLIC_* vars are baked into the client bundle at build time.
          # Store these as GitHub Actions secrets scoped to each environment.
          NEXT_PUBLIC_API_URL:                ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_IMAGES_URL:             ${{ secrets.NEXT_PUBLIC_IMAGES_URL }}
          NEXT_PUBLIC_AWS_REGION:             ${{ env.AWS_REGION }}
          NEXT_PUBLIC_COGNITO_USER_POOL_ID:   ${{ secrets.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID:      ${{ secrets.NEXT_PUBLIC_COGNITO_CLIENT_ID }}
          NEXT_PUBLIC_IMAGES_BUCKET:          ${{ secrets.NEXT_PUBLIC_IMAGES_BUCKET }}
        run: |
          IMAGE_BASE="${ECR_REGISTRY}/${ECR_REPOSITORY}"

          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL}" \
            --build-arg NEXT_PUBLIC_IMAGES_URL="${NEXT_PUBLIC_IMAGES_URL}" \
            --build-arg NEXT_PUBLIC_AWS_REGION="${NEXT_PUBLIC_AWS_REGION}" \
            --build-arg NEXT_PUBLIC_COGNITO_USER_POOL_ID="${NEXT_PUBLIC_COGNITO_USER_POOL_ID}" \
            --build-arg NEXT_PUBLIC_COGNITO_CLIENT_ID="${NEXT_PUBLIC_COGNITO_CLIENT_ID}" \
            --build-arg NEXT_PUBLIC_IMAGES_BUCKET="${NEXT_PUBLIC_IMAGES_BUCKET}" \
            -t "${IMAGE_BASE}:${IMAGE_TAG}" \
            -t "${IMAGE_BASE}:${ENV_LABEL}-latest" \
            .

          docker push "${IMAGE_BASE}:${IMAGE_TAG}"
          docker push "${IMAGE_BASE}:${ENV_LABEL}-latest"

          echo "image_uri=${IMAGE_BASE}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Post image URI to job summary
        run: |
          echo "## Frontend Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Environment:** \`${{ needs.resolve-env.outputs.env_label }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image:** \`${{ steps.push.outputs.image_uri }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ── 3. Deploy to ECS Express Mode ────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs:
      - resolve-env
      - build-and-push
    environment: ${{ needs.resolve-env.outputs.env_label }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/garden-club-github-${{needs.resolve-env.outputs.env_label}}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy new image to ECS Express service
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        with:
          service-name: ${{ needs.resolve-env.outputs.ecs_service }}
          cluster: ${{ needs.resolve-env.outputs.ecs_cluster }}
          image: ${{ needs.build-and-push.outputs.image_uri }}
                    execution-role-arn: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/garden-club-ecs-task-execution-${{needs.resolve-env.outputs.env_label}}
                    infrastructure-role-arn: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/garden-club-ecs-task-execution-${{needs.resolve-env.outputs.env_label}}

      - name: Post deploy summary
        run: |
          echo "## Frontend Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Environment:** \`${{ needs.resolve-env.outputs.env_label }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image deployed:** \`${{ needs.build-and-push.outputs.image_uri }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**ECS service:** \`${{ needs.resolve-env.outputs.ecs_service }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Cluster:** \`${{ needs.resolve-env.outputs.ecs_cluster }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Service is stable. Deployment complete." >> "$GITHUB_STEP_SUMMARY"
