services:
  localstack:
    image: localstack/localstack:3.0.0
    container_name: garden-club-localstack
    ports:
      - "4566:4566"
      - "4571:4571"
    environment:
      - SERVICES=s3,dynamodb,apigateway,lambda
      - DEBUG=0
      - LAMBDA_EXECUTOR=docker-reuse
      - DOCKER_HOST=unix:///var/run/docker.sock
      - LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT=1
    volumes:
      - localstack_data:/var/lib/localstack
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - localstack_default

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # These are read from .env.local (created by `npm run local:up`).
        # Run `npm run local:up` first so the file exists, then `docker compose up frontend`.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_IMAGES_URL: ${NEXT_PUBLIC_IMAGES_URL:-https://s3.localhost.localstack.cloud:4566/garden-club-images}
        NEXT_PUBLIC_AWS_REGION: ${NEXT_PUBLIC_AWS_REGION:-us-east-1}
        NEXT_PUBLIC_GOCNITO_USER_POOL_ID: ${NEXT_PUBLIC_GOCNITO_USER_POOL_ID}
        NEXT_PUBLIC_GOCNITO_CLIENT_ID: ${NEXT_PUBLIC_GOCNITO_CLIENT_ID}
    image: garden-club-frontend:local
    container_name: garden-club-frontend
    ports:
      - "3000:3000"
    depends_on:
      - localstack
    networks:
      - localstack_default

volumes:
  localstack_data:

networks:
  localstack_default:
    driver: bridge
