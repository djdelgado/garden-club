AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: Garden Club Web Application - SAM Template

Parameters:
  Stage:
    Type: String
    Default: local
    Description: Environment stage (local, dev, prod)
  CorsOrigin:
    Type: String
    Default: http://localhost:3000
    Description: CORS origin for API Gateway

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.12
    Environment:
      Variables:
        EVENTS_TABLE_NAME: !Ref EventsTable
        IMAGES_TABLE_NAME: !Ref ImagesTable
        IMAGES_BUCKET_NAME: !Ref ImagesBucket
        POWERTOOLS_SERVICE_NAME: GardenClub
        LOG_LEVEL: INFO

Resources:
  # Cognito User Pool
  GardenClubUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: GardenClubUserPool
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true

  GardenClubUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: GardenClubAppClient
      UserPoolId: !Ref GardenClubUserPool
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      GenerateSecret: false
      PreventUserExistenceErrors: LEGACY

  AdminsGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: Admins
      UserPoolId: !Ref GardenClubUserPool
      Description: Admin users group

  # DynamoDB Tables
  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: GardenClubEvents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: eventId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CreatedAtIndex
          KeySchema:
            - AttributeName: createdAt
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  ImagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: GardenClubImages
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: imageId
          AttributeType: S
        - AttributeName: folderName
          AttributeType: S
      KeySchema:
        - AttributeName: imageId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: FolderNameIndex
          KeySchema:
            - AttributeName: folderName
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # S3 Bucket
  ImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'garden-club-images-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - !Ref CorsOrigin
            AllowedMethods:
              - PUT
              - POST
              - GET
            AllowedHeaders:
              - '*'
            MaxAgeSeconds: 3000

  # API Gateway HTTP API
  GardenClubApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      CorsConfiguration:
        AllowOrigins:
          - !Ref CorsOrigin
        AllowHeaders:
          - Authorization
          - Content-Type
          - X-Amz-Date
          - X-Api-Key
          - X-Amz-Security-Token
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        MaxAge: 300

  # Lambda Execution Roles
  EventsLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource: !GetAtt EventsTable.Arn

  ImagesLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAndS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt ImagesTable.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:DeleteObject
                Resource: !Sub '${ImagesBucket.Arn}/*'

  UploadLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3PresignedUrlAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub '${ImagesBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt ImagesTable.Arn

  # Lambda Functions
  EventsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: GardenClubEventsFunction
      CodeUri: functions/events/
      Handler: handler.lambda_handler
      Role: !GetAtt EventsLambdaRole.Arn
      Events:
        GetEvents:
          Type: HttpApi
          Properties:
            ApiId: !Ref GardenClubApi
            Path: /events
            Method: GET
        GetEventById:
          Type: HttpApi
          Properties:
            ApiId: !Ref GardenClubApi
            Path: /events/{id}
            Method: GET
        CreateEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GardenClubApi
            Path: /events
            Method: POST
        UpdateEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GardenClubApi
            Path: /events/{id}
            Method: PUT
        DeleteEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GardenClubApi
            Path: /events/{id}
            Method: DELETE

  ImagesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: GardenClubImagesFunction
      CodeUri: functions/images/
      Handler: handler.lambda_handler
      Role: !GetAtt ImagesLambdaRole.Arn
      Events:
        GetImages:
          Type: HttpApi
          Properties:
            ApiId: !Ref GardenClubApi
            Path: /images
            Method: GET
        GetFolders:
          Type: HttpApi
          Properties:
            ApiId: !Ref GardenClubApi
            Path: /images/folders
            Method: GET
        DeleteImage:
          Type: HttpApi
          Properties:
            ApiId: !Ref GardenClubApi
            Path: /images/{imageId}
            Method: DELETE

  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: GardenClubUploadFunction
      CodeUri: functions/upload/
      Handler: handler.lambda_handler
      Role: !GetAtt UploadLambdaRole.Arn
      Events:
        PresignUrl:
          Type: HttpApi
          Properties:
            ApiId: !Ref GardenClubApi
            Path: /upload/presign
            Method: POST

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${GardenClubApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref GardenClubUserPool
  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref GardenClubUserPoolClient
  ImagesBucketName:
    Description: S3 Images Bucket Name
    Value: !Ref ImagesBucket
