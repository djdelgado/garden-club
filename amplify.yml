version: 1
applications:
  - frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - cd frontend
            - npm install
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: frontend/.next/standalone
        files:
          - '**/*'
        excludeFiles:
          - '**/*.map'
      cache:
        paths:
          - frontend/node_modules/**/*
          - frontend/.next/cache/**/*
    appRoot: frontend