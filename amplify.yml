version: 1
applications:
  - frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - nvm use 20 || node --version
            - npm install
        build:
          commands:
            - npm run build --workspace=frontend
      artifacts:
        baseDirectory: frontend/.next
        files:
          - '**/*'
      # cache:
      #   paths:
      #     - frontend/node_modules/**/*
      #     - frontend/.next/cache/**/*
    appRoot: frontend